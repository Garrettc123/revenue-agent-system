name: Autonomous Health

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check control plane (skip if secret missing)
        env:
          AUTO_API_CONTROL_PLANE_URL: ${{ secrets.AUTO_API_CONTROL_PLANE_URL }}
          AUTO_API_CONTROL_PLANE_TOKEN: ${{ secrets.AUTO_API_CONTROL_PLANE_TOKEN }}
        run: |
          set -e
          if [ -z "$AUTO_API_CONTROL_PLANE_URL" ] || [ -z "$AUTO_API_CONTROL_PLANE_TOKEN" ]; then
            echo "AUTO_API_CONTROL_PLANE secrets not configured - skipping control plane check"
            echo "CONTROL_PLANE_STATUS=unconfigured" >> $GITHUB_ENV
          else
            echo "Calling control plane health endpoint..."
            RESPONSE=$(curl -fsS -X POST "${AUTO_API_CONTROL_PLANE_URL}/health" \
              -H "Authorization: Bearer ${AUTO_API_CONTROL_PLANE_TOKEN}" \
              -H "Content-Type: application/json" \
              --data "{\"repository\":\"${GITHUB_REPOSITORY}\"}" \
              --max-time 10 || echo "UNREACHABLE")
            echo "Control plane response: $RESPONSE"
            echo "CONTROL_PLANE_STATUS=ok" >> $GITHUB_ENV
          fi

      - name: Check Garcar backend (Railway)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "Checking Garcar Enterprise backend health..."
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" --max-time 15 \
            https://garcar-enterprise-production-production.up.railway.app/health || echo "000")
          echo "Backend HTTP status: $STATUS"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "404" ]; then
            echo "Backend reachable - status $STATUS"
          else
            echo "Backend may be down or deploying - status $STATUS (non-blocking)"
          fi

      - name: Check Garcar frontend (Vercel)
        run: |
          echo "Checking Garcar frontend health..."
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" --max-time 15 \
            https://frontend-sigma-flame-17.vercel.app || echo "000")
          echo "Frontend HTTP status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "Frontend is LIVE and healthy"
          else
            echo "Frontend returned status $STATUS"
          fi

      - name: Health summary
        run: |
          echo "=== GARCAR ENTERPRISE HEALTH REPORT ==="
          echo "Time: $(date -u)"
          echo "Repo: $GITHUB_REPOSITORY"
          echo "Control Plane: ${CONTROL_PLANE_STATUS:-unconfigured}"
          echo "======================================="
