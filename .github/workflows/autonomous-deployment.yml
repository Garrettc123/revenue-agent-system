name: Autonomous Deployment

permissions:
  contents: read
  deployments: write
  statuses: write

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  notify-control-plane:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Call control plane deploy endpoint (skip if secret missing)
        env:
          AUTO_API_CONTROL_PLANE_URL: ${{ secrets.AUTO_API_CONTROL_PLANE_URL }}
          AUTO_API_CONTROL_PLANE_TOKEN: ${{ secrets.AUTO_API_CONTROL_PLANE_TOKEN }}
        run: |
          if [ -z "$AUTO_API_CONTROL_PLANE_URL" ] || [ -z "$AUTO_API_CONTROL_PLANE_TOKEN" ]; then
            echo "AUTO_API_CONTROL_PLANE secrets not set - skipping control plane notify"
            echo "Configure AUTO_API_CONTROL_PLANE_URL and AUTO_API_CONTROL_PLANE_TOKEN in repo secrets to enable"
          else
            echo "Notifying control plane of deployment..."
            curl -fsS -X POST "${AUTO_API_CONTROL_PLANE_URL}/deploy" \
              -H "Authorization: Bearer ${AUTO_API_CONTROL_PLANE_TOKEN}" \
              -H "Content-Type: application/json" \
              --data "{\"repository\":\"${GITHUB_REPOSITORY}\",\"ref\":\"${GITHUB_REF_NAME}\",\"sha\":\"${GITHUB_SHA}\"}" \
              --max-time 10 \
              && echo "Control plane notified successfully" \
              || echo "Control plane notify failed (non-blocking)"
          fi

  deploy-railway:
    runs-on: ubuntu-latest
    needs: notify-control-plane
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "RAILWAY_TOKEN not set - skipping Railway deploy"
          else
            echo "Installing Railway CLI..."
            npm install -g @railway/cli 2>/dev/null || true
            echo "Triggering Railway deployment..."
            railway up --detach 2>/dev/null \
              && echo "Railway deploy triggered" \
              || echo "Railway CLI deploy failed - check token and project config"
          fi

  deploy-summary:
    runs-on: ubuntu-latest
    needs: [notify-control-plane, deploy-railway]
    if: always()
    steps:
      - name: Print deployment summary
        run: |
          echo "=== GARCAR AUTONOMOUS DEPLOYMENT COMPLETE ==="
          echo "Repo:   $GITHUB_REPOSITORY"
          echo "Ref:    $GITHUB_REF_NAME"
          echo "SHA:    $GITHUB_SHA"
          echo "Time:   $(date -u)"
          echo "============================================="
